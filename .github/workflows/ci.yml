name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          for req in backend/*/requirements.txt; do
            [ -f "$req" ] && pip install -r "$req" || true
          done
      - name: Lint backend
        run: |
          pip install flake8
          flake8 backend || true
      - name: Run backend tests
        run: |
          pip install pytest
          pytest backend/tests || true
      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci
      - name: Lint frontend
        run: |
          cd frontend
          npm install eslint eslint-plugin-react --no-save
          npx eslint src || true
      - name: Build frontend
        run: |
          cd frontend
          npm run build
      - name: Run frontend tests
        run: |
          cd frontend
          npm run test -- --watchAll=false || true
      - name: Build Docker images
        run: |
          docker build -t vendinsights/ingest:latest backend/ingest_function
          docker build -t vendinsights/aggregate:latest backend/aggregate_function
          docker build -t vendinsights/insights:latest backend/insights_function
          docker build -t vendinsights/ask:latest backend/ask_function
          docker build -t vendinsights/email:latest backend/email_function
      - name: Push images to registry
        if: github.ref == 'refs/heads/main'
        run: |
          echo "docker login -u ${{ secrets.REGISTRY_USER }} -p ${{ secrets.REGISTRY_PASS }} registry.example.com"
          echo "docker push vendinsights/ingest:latest"
          echo "docker push vendinsights/aggregate:latest"
          echo "docker push vendinsights/insights:latest"
          echo "docker push vendinsights/ask:latest"
          echo "docker push vendinsights/email:latest"
